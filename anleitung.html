<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anleitung – FLVW Social Media GFX Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20">
</head>

<body class="guide-page">
  <header class="page-header">
    <div class="logo-wrap">
      <a class="logo-link" href="index.html" aria-label="Zurück zum Generator">
        <img class="logo" src="assets/logo.png" alt="Logo">
      </a>
    </div>
    <div class="results-menu" id="resultsMenuWrap">
      <button class="menu-btn" id="menuBtn" type="button" aria-label="Menü" aria-expanded="false"
        aria-controls="menuDropdown">
        <svg class="menu-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="currentColor"
            d="M3 6.5a1 1 0 0 1 1-1h16a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1Zm0 5.5a1 1 0 0 1 1-1h16a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1Zm1 4.5a1 1 0 0 0 0 2h16a1 1 0 1 0 0-2H4Z" />
        </svg>
      </button>
      <div class="menu-dropdown hidden" id="menuDropdown" role="menu" aria-label="Aktionen">
        <button class="menu-item" type="button" role="menuitem" disabled>Alle herunterladen</button>
        <a class="menu-item" href="index.html" role="menuitem">Neuer Upload</a>
        <a class="menu-item" href="anleitung.html" role="menuitem" aria-current="page">Anleitung</a>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="section-inner">
        <div class="upload-card guide-card">
          <div class="guide-grid">
            <aside class="info-panel guide-toc" aria-label="Inhaltsverzeichnis">
              <nav id="guideNav">
                <!-- Links will be inserted here dynamically -->
              </nav>
            </aside>

            <div class="guide-content" id="guideContent">
              <!-- Content panels will be inserted here dynamically -->
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="disclaimer" id="footerText">FLVW Marketing GmbH | Jahnstraße 76-78 | 59174 Kamen</div>

  <script>
    const menuBtn = document.getElementById("menuBtn");
    const menuDropdown = document.getElementById("menuDropdown");
    function closeMenu() {
      if (!menuDropdown || !menuBtn) return;
      menuDropdown.classList.add("hidden");
      menuBtn.setAttribute("aria-expanded", "false");
    }
    if (menuBtn && menuDropdown) {
      menuBtn.addEventListener("click", (e) => {
        e.preventDefault();
        const isOpen = !menuDropdown.classList.contains("hidden");
        if (isOpen) {
          closeMenu();
          return;
        }
        menuDropdown.classList.remove("hidden");
        menuBtn.setAttribute("aria-expanded", "true");
      });
      document.addEventListener("click", (e) => {
        if (e.target === menuBtn || menuBtn.contains(e.target)) return;
        if (menuDropdown.contains(e.target)) return;
        closeMenu();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeMenu();
      });
    }

    // Dynamic Content Loading
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch('api.php?action=config&v=' + Date.now());
        const config = await res.json();

        // Populate Footer
        if (config.text && config.text.footer) {
          document.getElementById('footerText').textContent = config.text.footer;
        }

        // Populate Guide Sections
        if (config.guide) {
          const navContainer = document.getElementById('guideNav');
          const contentContainer = document.getElementById('guideContent');

          config.guide.forEach(section => {
            // Build Nav Link
            const link = document.createElement('a');
            link.className = 'toc-link';
            link.href = '#' + section.id;
            link.textContent = section.menuTitle;
            navContainer.appendChild(link);

            // Build Content Panel
            const panel = document.createElement('section');
            panel.className = 'info-panel';
            panel.id = section.id;

            panel.innerHTML = `
              <div class="panel-head">
                <span class="panel-icon" aria-hidden="true">${section.icon}</span>
                <h3>${section.title}</h3>
              </div>
              <p>${section.content}</p>
            `;
            contentContainer.appendChild(panel);
          });
        }
        if (config.theme) {
          applyTheme(config.theme);
        }

      } catch (err) {
        console.error("Failed to load config for guide page", err);
      }
    });

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : null;
    }

    function applyTheme(theme) {
      if (!theme) return;

      let style = document.getElementById('dynamic-theme');
      if (!style) {
        style = document.createElement('style');
        style.id = 'dynamic-theme';
        document.head.appendChild(style);
      }

      const rgb = hexToRgb(theme.accent || '#cc071e');
      const isDark = theme.glass === 'dark';

      style.innerHTML = `
            :root {
                --accent: ${theme.accent};
                --accent-rgb: ${rgb};
                --accent-strong: ${theme.accentDark || 'color-mix(in srgb, var(--accent) 80%, black)'};
                --accent-hover: ${theme.accentDark || 'color-mix(in srgb, var(--accent) 90%, black)'};
                --accent-95: rgba(${rgb}, 0.95);
                --accent-callout-bg: ${theme.accentLight || `rgba(${rgb}, 0.08)`};
                --accent-callout-border: rgba(${rgb}, 0.15);
                
                --cta-green: ${theme.gradientStart ? `linear-gradient(135deg, ${theme.gradientStart}, ${theme.gradientEnd || theme.gradientStart})` : 'var(--accent)'};
                --cta-green-strong: ${theme.gradientStart ? `linear-gradient(135deg, ${theme.gradientEnd || theme.gradientStart}, ${theme.gradientStart})` : 'var(--accent-strong)'};
                --cta-green-hover: var(--cta-green-strong);
                --cta-green-92: rgba(${rgb}, 0.92);

                --page-glow-accent-1: ${theme.accentLight || `rgba(${rgb}, 0.15)`};
                --page-glow-accent-2: ${theme.accentLight || `rgba(${rgb}, 0.08)`};

                /* Glass Mode Variables */
                --glass-bg: ${isDark ? 'rgba(30, 30, 30, 0.75)' : 'rgba(255, 255, 255, 0.7)'};
                --glass-bg-strong: ${isDark ? 'rgba(30, 30, 30, 0.9)' : 'rgba(255, 255, 255, 0.9)'};
                --glass-border: ${isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 255, 255, 0.4)'};
                --glass-saturate: ${isDark ? '120%' : '180%'};
                --ui-surface-01: ${isDark ? 'rgba(0,0,0,0.4)' : '#ffffff'};
                --ui-surface-02: ${isDark ? 'rgba(255,255,255,0.05)' : '#f3f4f6'};
                --ui-surface-06: ${isDark ? 'rgba(255,255,255,0.1)' : '#e5e7eb'};
                --text: ${isDark ? '#f3f4f6' : '#333333'};
                --text-contrast: ${isDark ? '#ffffff' : '#000000'};
                --text-muted: ${isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.66)'};
                --text-soft: ${isDark ? 'rgba(255,255,255,0.7)' : 'rgba(0, 0, 0, 0.6)'};
                --text-dim: ${isDark ? 'rgba(255,255,255,0.4)' : 'rgba(0, 0, 0, 0.4)'};
            }
        `;
    }
  </script>
</body>

</html>
